services:
  - type: web
    name: reading-place
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app/app.py"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: THUNDERFOREST_API_KEY
        sync: false
